<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - The Healing Canopy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Book Antiqua, sans-serif;
      background-color: #f4f7fa;
      margin: 0;
      display: flex;
    }
    .sidebar {
      width: 250px;
      background-color: #598a73;
      color: white;
      height: 100vh;
      padding: 20px 0;
      position: fixed;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 1px solid #7c9164;
      padding-bottom: 10px;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar ul li {
      padding: 15px 20px;
      cursor: pointer;
      font-size: 18px;
    }
    .sidebar ul li:hover, .sidebar ul li.active {
      background-color: #3e665e;
    }
    .main-content {
      margin-left: 250px;
      padding: 30px;
      width: calc(100% - 250px);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: white;
      padding: 15px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .header h1 {
      margin: 0;
      color: #2a4d30;
    }
    .btn-logout {
      background: #f44336;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
    }
    .tab-content {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .tab-content.active {
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
      color: #333;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>The Healing Canopy Admin</h2>
    <p style="text-align:center; margin-bottom:20px; color:#e0e0e0;" id="doctorNameDisplay"></p>
    <ul>
      <li class="tab-link active" onclick="switchTab('appointments')">My Appointments</li>
      <li class="tab-link" onclick="switchTab('messages')">Contact Messages</li>
      <li class="tab-link" onclick="switchTab('users')">Registered Users</li>
    </ul>
  </div>

  <div class="main-content">
    <div class="header">
      <h1 id="tabTitle">My Appointments</h1>
      <button class="btn-logout" onclick="logoutAdmin()">Logout</button>
    </div>

    <!-- Appointments Tab -->
    <div id="appointments" class="tab-content active">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Patient Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Date</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="appointmentsTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

    <!-- Messages Tab -->
    <div id="messages" class="tab-content">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="messagesTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

    <!-- Users Tab -->
    <div id="users" class="tab-content">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
